name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip -o ScreenTime-project.zip

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Make gradlew executable
        run: chmod +x ScreenTime/gradlew

      - name: Build debug APK
        working-directory: ScreenTime
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ScreenTime-debug-apk
          path: ScreenTime/app/build/outputs/apk/debug/app-debug.apk
